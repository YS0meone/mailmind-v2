services:
  postgres:
    image: postgres:16-alpine
    container_name: mailmind-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mailmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mailmind_dev}
      POSTGRES_DB: ${POSTGRES_DB:-mailmind}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mailmind}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mailmind-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Dev profile: full stack ──────────────────────────

  backend:
    profiles: [dev]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mailmind-backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mailmind}:${POSTGRES_PASSWORD:-mailmind_dev}@postgres:5432/${POSTGRES_DB:-mailmind}
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --reload

  frontend:
    profiles: [dev]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mailmind-frontend
    ports:
      - "3000:3000"
    env_file: ./frontend/.env
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    command: pnpm dev

volumes:
  postgres_data:
  qdrant_data:
